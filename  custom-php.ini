; Limites de Upload para suportar arquivos grandes no WebDAV e WP Media
upload_max_filesize = 500M
post_max_size = 500M

; Limites de memória e tempo para evitar gargalos em plugins pesados
memory_limit = 512M
max_execution_time = 300
max_input_time = 300

; Otimizações de Performance do OPcache recomendadas para o Edge
opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 60
opcache.save_comments = 1
